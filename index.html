<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Transport System PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;background:white;text-align:center;}
.header{background:#ff5a00;padding:15px;color:white;font-size:20px;}
button{padding:10px;margin:5px;border:none;border-radius:10px;background:#1c2b33;color:white;cursor:pointer;}
input,select,textarea{padding:10px;margin:5px;width:250px;}
.section{display:none;padding:20px;}
.section.active{display:block;}
.item{border-bottom:1px solid #ccc;padding:5px;}
.ok{background:#c8f7c5;}
.bad{background:#f7c5c5;}
.pending{background:#fff3cd;}
.center-btn{display:flex;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>

<div class="header">🚚 TRANSPORT SYSTEM PRO</div>

<!-- START -->
<div id="menu" class="section active">
<h2>Wybierz proces:</h2>
<div class="center-btn">
<button onclick="show('prep')">📦 Przygotowanie transportu</button>
<button onclick="show('odbior')">📥 Odbiór transportu</button>
<button onclick="show('dashboard')">📊 Dashboard</button>
</div>
</div>

<!-- PRZYGOTOWANIE -->
<div id="prep" class="section">
<h3>Przygotowanie transportu</h3>
<label>Magazyn Z:</label>
<select id="magZ">
<option value="">Wybierz...</option>
<option value="M10">M10</option>
<option value="M13">M13</option>
<option value="M40">M40</option>
<option value="PLR">PLR</option>
<option value="M66">M66</option>
<option value="B">B</option>
<option value="C27">C27</option>
</select>

<label>Magazyn DO:</label>
<select id="magDo">
<option value="">Wybierz...</option>
<option value="M10">M10</option>
<option value="M13">M13</option>
<option value="M40">M40</option>
<option value="PLR">PLR</option>
<option value="M66">M66</option>
<option value="B">B</option>
<option value="C27">C27</option>
</select>

<input id="auto" placeholder="Nr auta"><br>
<input id="scan" placeholder="Skanuj paletę..."><br>

<button onclick="resetPrep()">Reset</button>
<button onclick="closeTruck()">Zamknij + QR</button>
<button onclick="drukTransport()">🧾 Wydruk</button>
<button onclick="drukOpisowki()">🏷️ Opisówki palet</button>
<div class="center-btn"><button onclick="backToMenu()">⬅️ Panel główny</button></div>
<div id="lista"></div>
</div>

<!-- ODBIÓR -->
<div id="odbior" class="section">
<h3>Odbiór transportu</h3>
<textarea id="qrInput" placeholder="Wklej lub zeskanuj QR"></textarea><br>
<button onclick="scanQR()">📱 Skanuj QR Aparatem</button>
<button onclick="showOdbior()">Pokaż palety</button>
<button onclick="zatwierdzOdbior()">✅ Zatwierdź odbiór</button>
<button onclick="exportCSV()">📊 Eksport CSV</button>
<div class="center-btn"><button onclick="backToMenu()">⬅️ Panel główny</button></div>
<div id="odbiorLista"></div>
<div id="podsumowanie"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h3>📊 Dashboard transportów</h3>
<input id="filterAuto" placeholder="Filtruj po aucie">
<input type="date" id="filterDate">
<button onclick="loadTransports()">🔄 Odśwież</button>
<div id="dashboardLista"></div>
<div class="center-btn"><button onclick="backToMenu()">⬅️ Panel główny</button></div>
</div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAJhqaKJZlTsrp3oDLytGBBF63nN083P2o",
  authDomain: "transportsystem-d8989.firebaseapp.com",
  projectId: "transportsystem-d8989"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Zmienne globalne
let palety=[], transportId="";

// FUNKCJE
function show(id){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");}
function backToMenu(){show('menu'); resetPrep(); resetOdbior();}

// PRZYGOTOWANIE
document.getElementById("scan").addEventListener("keypress", e=>{
 if(e.key==="Enter"){
  let val=e.target.value.trim();
  if(val && !palety.includes(val)) palety.push(val);
  e.target.value="";
  renderPrep();
 }
});
function renderPrep(){let html="<b>Palety: "+palety.length+"</b><br>";palety.forEach(p=>html+=`<div class="item">${p}</div>`);document.getElementById("lista").innerHTML=html;}
function resetPrep(){palety=[];renderPrep(); document.getElementById("scan").value="";}

// Podział prefixów
function grupuj(){let g={};palety.forEach(p=>{let pre=p.split("-")[0];if(!g[pre]) g[pre]=[]; g[pre].push(p);}); return g;}

// Zamknięcie i QR
function closeTruck(){
 const auto=document.getElementById("auto").value;
 const magZ=document.getElementById("magZ").value;
 const magDo=document.getElementById("magDo").value;
 if(!auto||!magZ||!magDo||palety.length===0){alert("Uzupełnij dane!"); return;}
 transportId="T-"+Date.now();
 const timestamp=new Date().toISOString();
 db.collection("transports").doc(transportId).set({auto,magazynZ:magZ,magazynDo:magDo,palety,status:"pending",braki:[],timestamp});

 const okno=window.open("");
 const dane=palety.join("\\n");
 okno.document.write(`<html><body style="text-align:center;font-family:Arial;"><h2>${auto}</h2><p>${magZ} → ${magDo}</p><p>${timestamp}</p><div id="qr"></div><script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script><script>QRCode.toCanvas("${dane}",{width:300},function(err,canvas){document.getElementById("qr").appendChild(canvas);});<\/script></body></html>`);
 resetPrep(); loadTransports();
}

// Wydruk transportu
function drukTransport(){if(palety.length===0){alert("Brak danych");return;}const grupy=grupuj(); const okno=window.open(""); let html="<h2>Transport</h2>"; Object.keys(grupy).forEach(k=>{html+=`<h3>${k}</h3>`; grupy[k].forEach(p=>html+=`<div>${p}</div>`);}); okno.document.write("<html><body>"+html+"</body></html>"); okno.print();}

// Druk opisówek palet
function drukOpisowki(){if(palety.length===0){alert("Brak palet");return;} const auto=document.getElementById("auto").value; const okno=window.open(""); let html="<html><body style='text-align:center;'>"; palety.forEach((p,i)=>{html+=`<div style='border:1px solid #000;margin:5px;padding:5px;display:inline-block;'><h3>${p}</h3><p>${auto}</p><svg id='bc${i}'></svg></div>`}); html+="<script src='https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js'><\/script><script>palety="+JSON.stringify(palety)+".forEach((p,i)=>{JsBarcode('#bc'+i,p,{format:'CODE128'});}); window.print();<\/script></body></html>"; okno.document.write(html); okno.document.close();}

// Odbiór
function showOdbior(){const val=document.getElementById("qrInput").value;if(!val){alert("Brak QR!");return;} let list=val.split("\n"); let html=""; list.forEach(p=>{if(p.trim()) html+=`<div class='item'><input type='checkbox' checked> ${p}</div>`});document.getElementById("odbiorLista").innerHTML=html;}

// Zatwierdzenie odbioru
function zatwierdzOdbior(){const inputs=document.querySelectorAll("#odbiorLista input"); let brak=[]; inputs.forEach(el=>{if(!el.checked) brak.push(el.parentNode.textContent.trim());}); const status=brak.length===0?"ok":"incomplete"; db.collection("transports").doc(transportId).update({status,status,braki:brak}); document.getElementById("podsumowanie").innerHTML="Status: "+status+" | Braki: "+brak.length; loadTransports();}

// QR scanner aparatem
function scanQR(){const html5Qr=new Html5Qrcode("odbiorLista"); html5Qr.start({facingMode:"environment"},{fps:10,qrbox:250}, msg=>{document.getElementById("qrInput").value=msg; showOdbior(); html5Qr.stop();});}

// Dashboard
function loadTransports(){
 const filterAuto=document.getElementById("filterAuto").value.toLowerCase();
 const filterDate=document.getElementById("filterDate").value;
 db.collection("transports").get().then(snapshot=>{
  let html="";
  snapshot.forEach(doc=>{
   let d=doc.data();
   if(filterAuto && !d.auto.toLowerCase().includes(filterAuto)) return;
   if(filterDate && !d.timestamp.startsWith(filterDate)) return;
   let cls="pending"; if(d.status==="ok") cls="ok"; if(d.status==="incomplete") cls="bad";
   html+=`<div class='item ${cls}'><b>${d.auto}</b> | ${d.magazynZ} → ${d.magazynDo}<br>${d.timestamp}<br>Status: ${d.status}<br>Braki: ${(d.braki||[]).join(", ")}<br><button onclick="deleteTransport('${doc.id}')">🗑️ Usuń</button></div>`;
  });
  document.getElementById("dashboardLista").innerHTML=html;
 });
}

// Usuń transport
function deleteTransport(id){if(confirm("Na pewno?")) db.collection("transports").doc(id).delete().then(()=>loadTransports());}

// Eksport CSV
function exportCSV(){if(!transportId){alert("Brak transportu");return;} db.collection("transports").doc(transportId).get().then(doc=>{if(!doc.exists){alert("Brak dokumentu"); return;} let d=doc.data(); let csv="Auto;Paleta;Status\n"; d.palety.forEach(p=>{let status=(d.braki.includes(p))?"BRAK":"OK"; csv+=`${d.auto};${p};${status}\n`;}); const blob=new Blob([csv],{type:"text/csv"}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`Transport_${Date.now()}.csv`; a.click();});}

</script>
</body>
</html>
