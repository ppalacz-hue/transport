<meta charset="UTF-8">
<title>Transport Multi-Magazyn</title>

<!-- Biblioteki -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;background:#0f1c22;color:white;}
.header{display:flex;background:#ff5a00;padding:15px;font-size:20px;font-weight:bold;}
.tabs button{background:#1c2b33;color:white;border:none;padding:15px;margin:5px;cursor:pointer;}
.tabs button.active{background:#ff5a00;}
.section{display:none;padding:20px;}
.section.active{display:block;}
input,textarea{padding:10px;margin:5px;width:250px;}
button{padding:10px;margin:5px;cursor:pointer;}
.list{margin-top:20px;}
.item{display:flex;justify-content:space-between;border-bottom:1px solid #333;padding:5px;}
.ok{color:lightgreen;}
.brak{color:red;}
</style>
</head>

<body>

<div class="header">🚚 SYSTEM TRANSPORTOWY</div>
<div class="tabs">
<button onclick="tab('prep')" class="active">📦 Przygotowanie</button>
<button onclick="tab('odbior')">📥 Odbiór</button>
</div>

<!-- ================= PRZYGOTOWANIE ================= -->
<div id="prep" class="section active">
<h3>Przygotowanie transportu</h3>
<input id="magZ" placeholder="Magazyn Z">
<input id="magDo" placeholder="Magazyn DO">
<input id="auto" placeholder="Nr auta"><br>
<input id="scan" placeholder="Skanuj kod palety..." autofocus>
<button onclick="reset()">Reset</button>
<button onclick="zamknij()">Zamknij i QR</button>
<button onclick="drukujPalety()">🧾 Drukuj palety</button>
<div id="lista" class="list"></div>
<div id="grupy"></div>
</div>

<!-- ================= ODBIÓR ================= -->
<div id="odbior" class="section">
<h3>Odbiór transportu</h3>
<button onclick="scanQR()">📱 Skanuj QR</button>
<button onclick="resetOdbior()">Reset</button>
<button onclick="exportExcel()">📊 Excel</button><br>
<textarea id="qr"></textarea>
<button onclick="pokaz()">Pokaż</button>
<div id="odbiorLista"></div>
<div id="podsumowanie"></div>
<h3>Statystyki</h3>
<div id="stats"></div>
</div>

<script>
// ===== Firebase =====
const firebaseConfig = YOUR_FIREBASE_CONFIG_HERE;
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ===== Tabs =====
function tab(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
}

// ===== Przygotowanie =====
let lista=[], transportNr="";

scan.addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    let v=scan.value.trim();
    if(v && !lista.includes(v)) lista.push(v);
    scan.value="";
    render();
  }
});

function render(){
  let div="", grupy={};
  lista.forEach((k,i)=>{
    let p=k.split("-")[0];
    grupy[p]=(grupy[p]||0)+1;
    div+=`<div class="item">${k} <button onclick="usun(${i})">X</button></div>`;
  });
  document.getElementById("lista").innerHTML="<b>Palety: "+lista.length+"</b>"+div;
  let g=""; for(let x in grupy) g+=x+": "+grupy[x]+"<br>";
  document.getElementById("grupy").innerHTML=g;
}

function usun(i){ lista.splice(i,1); render(); }
function reset(){ lista=[]; render(); }

// Numer transportu
function genNr(){
  let d=new Date();
  return "T-"+d.getFullYear()+(""+(d.getMonth()+1)).padStart(2,"0")+(""+d.getDate()).padStart(2,"0")+"-"+(""+d.getHours()).padStart(2,"0")+(""+d.getMinutes()).padStart(2,"0");
}

// Zamknięcie transportu + zapis w Firebase
function zamknij(){
  transportNr=genNr();
  let dane={
    id: transportNr,
    magazynZ: magZ.value,
    magazynDo: magDo.value,
    auto: auto.value,
    palety: lista,
    created: Date.now()
  };
  db.collection("transports").doc(transportNr).set(dane)
    .then(()=>console.log("Transport zapisany"));
  
  let qrData = transportNr; // QR tylko z ID
  let w=window.open("");
  w.document.write(`<h2>${transportNr}</h2><canvas id="q"></canvas>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>
  <script>
    QRCode.toCanvas(document.getElementById("q"), "${qrData}");
    setTimeout(()=>window.print(),500);
  <\/script>`);
}

// Druk palet
function drukujPalety(){
  let w=window.open("");
  lista.forEach(k=>{
    w.document.write(`<div style="page-break-after:always;text-align:center">
      <h2>${k}</h2>
      <svg id="b${k}"></svg>
    </div>`);
  });
  w.document.write(`<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"><\/script>
    <script>${lista.map(k=>`JsBarcode("#b${k}","${k}")`).join(";")}
  <\/script>`);
}

// ===== Odbiór =====
let odebrane=[];
function scanQR(){
  const qrScanner=new Html5Qrcode("reader");
  qrScanner.start({facingMode:"environment"},{fps:10,qrbox:250},
  msg=>{
    qrScanner.stop();
    qr.value=msg;
    pokaz();
  });
}

function pokaz(){
  let id = qr.value.trim();
  if(!id) return;
  db.collection("transports").doc(id).get().then(doc=>{
    if(!doc.exists) return alert("Transport nie znaleziony");
    let t = doc.data();
    transportNr = t.id;
    let html="", palety=t.palety;
    odebrane=[];
    palety.forEach(p=>{
      html+=`<div class="item"><input type="checkbox" onchange="check('${p}',this)"> ${p}</div>`;
    });
    odbiorLista.innerHTML=html;
    podsumuj();
  });
}

function check(k,el){
  if(el.checked) odebrane.push(k);
  else odebrane=odebrane.filter(x=>x!==k);
  podsumuj();
}

function podsumuj(){
  let total=document.querySelectorAll("#odbiorLista .item").length;
  let ok=odebrane.length;
  podsumowanie.innerHTML=`OK: ${ok} / ${total} | BRAK: ${total-ok}`;
}

// Reset odbioru
function resetOdbior(){
  qr.value=""; odbiorLista.innerHTML=""; podsumowanie.innerHTML="";
  odebrane=[];
}

// Eksport do Excel
function exportExcel(){
  if(!transportNr) return alert("Brak transportu");
  let csv="Transport;Paleta;Status\n";
  document.querySelectorAll("#odbiorLista .item").forEach(el=>{
    let kod=el.innerText.trim();
    let status=el.querySelector("input").checked ? "OK":"BRAK";
    csv+=`${transportNr};${kod};${status}\n`;
  });
  let data=new Date().toISOString().slice(0,10);
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`${data}_${transportNr}.csv`;
  a.click();
}
</script>

</body>
</html>
