<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Transport Multi-Magazyn</title>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAJhqaKJZlTsrp3oDLytGBBF63nN083P2o",
  authDomain: "transportsystem-d8989.firebaseapp.com",
  projectId: "transportsystem-d8989",
  storageBucket: "transportsystem-d8989.firebasestorage.app",
  messagingSenderId: "32173202438",
  appId: "1:32173202438:web:15fbec63c83fe043ba3787",
  measurementId: "G-SP680XJ11W"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.db = db;
</script>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;background:#0f1c22;color:white;text-align:center;}
.header{display:flex;background:#ff5a00;padding:15px;font-size:20px;font-weight:bold;justify-content:center;}
.button-select, .button-round{
  padding:15px 25px;
  margin:15px;
  cursor:pointer;
  background:#1c2b33;
  color:white;
  border:none;
  border-radius:15px;
  font-size:18px;
  transition:0.3s;
}
.button-select:hover, .button-round:hover{background:#ff5a00;}
.section{display:none;padding:20px;}
.section.active{display:block;}
input,textarea{padding:10px;margin:5px;width:250px;}
button{padding:10px;margin:5px;cursor:pointer;}
.list{margin-top:20px;}
.item{display:flex;justify-content:space-between;border-bottom:1px solid #333;padding:5px;align-items:center;}
.item svg{margin-left:10px;}
.ok{color:lightgreen;}
.brak{color:red;}
.center-btn{display:flex;justify-content:center;}
</style>
</head>

<body>

<div class="header">🚚 SYSTEM TRANSPORTOWY</div>

<!-- Ekran wyboru procesu -->
<div id="selectProcess" class="section active">
  <h2>Wybierz proces:</h2>
  <div class="center-btn">
    <button class="button-select" onclick="showProcess('prep')">📦 Przygotowanie transportu</button>
    <button class="button-select" onclick="showProcess('odbior')">📥 Odbiór transportu</button>
  </div>
</div>

<!-- Przygotowanie transportu -->
<div id="prep" class="section">
<h3>Przygotowanie transportu</h3>
<input id="magZ" placeholder="Magazyn Z">
<input id="magDo" placeholder="Magazyn DO">
<input id="auto" placeholder="Nr auta"><br>
<input id="scan" placeholder="Skanuj kod palety..." autofocus>
<button class="button-round" onclick="resetPrep()">Reset</button>
<button class="button-round" onclick="closeTransport()">Zamknij i QR</button>
<button class="button-round" onclick="printPalets()">🧾 Drukuj palety</button>
<div class="center-btn"><button class="button-round" onclick="backToMenu()">⬅️ Powrót do panelu głównego</button></div>
<div id="lista" class="list"></div>
<div id="grupy"></div>
</div>

<!-- Odbiór transportu -->
<div id="odbior" class="section">
<h3>Odbiór transportu</h3>
<button class="button-round" onclick="scanQR()">📱 Skanuj QR</button>
<button class="button-round" onclick="resetOdbior()">Reset</button>
<button class="button-round" onclick="exportExcel()">📊 Excel</button><br>
<textarea id="qr" placeholder="Lub wklej ID transportu"></textarea>
<button class="button-round" onclick="showOdbior()">Pokaż</button>
<div class="center-btn"><button class="button-round" onclick="backToMenu()">⬅️ Powrót do panelu głównego</button></div>
<div id="odbiorLista"></div>
<div id="podsumowanie"></div>
<div id="reader"></div>
<h3>Statystyki</h3>
<div id="stats"></div>
</div>

<script>
let lista=[], transportId="", odebraneSet=new Set();

// --- Powrót do panelu głównego ---
function backToMenu(){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById("selectProcess").classList.add("active");
  // wyczyść pola i listy w obu modułach
  resetPrep();
  resetOdbior();
}

// --- Wybor procesu ---
function showProcess(id){
  document.getElementById('selectProcess').classList.remove('active');
  document.getElementById(id).classList.add('active');
}

// --- Przygotowanie ---
scan.addEventListener("keypress", e=>{
  if(e.key==="Enter"){
    let v=scan.value.trim();
    if(v && !lista.includes(v)){
      lista.push(v);
    }
    scan.value="";
    renderPrep();
  }
});

function renderPrep(){
  let html="", grupy={};
  lista.forEach((k,i)=>{
    let prefix=k.split("-")[0];
    grupy[prefix]=(grupy[prefix]||0)+1;
    html+=`<div class="item">${k} <button onclick="removePrep(${i})">X</button></div>`;
  });
  document.getElementById("lista").innerHTML="<b>Palety: "+lista.length+"</b>"+html;
  let g=""; for(let x in grupy) g+=x+": "+grupy[x]+"<br>";
  document.getElementById("grupy").innerHTML=g;
}
function removePrep(i){ lista.splice(i,1); renderPrep(); }
function resetPrep(){ lista=[]; renderPrep(); }

function genTransportId(){
  let d=new Date();
  return "T-"+d.getFullYear()+(""+(d.getMonth()+1)).padStart(2,"0")+(""+d.getDate()).padStart(2,"0")+"-"+(""+d.getHours()).padStart(2,"0")+(""+d.getMinutes()).padStart(2,"0");
}

async function closeTransport(){
  if(!magZ.value || !magDo.value || !auto.value || lista.length===0){
    alert("Wypełnij magazyny, auto i zeskanuj przynajmniej 1 paletę!");
    return;
  }
  transportId=genTransportId();
  const data={id: transportId, magazynZ: magZ.value, magazynDo: magDo.value, auto: auto.value, palety: lista, created: Date.now()};
  await db.collection("transports").doc(transportId).set(data);

  let w=window.open("");
  w.document.write(`<h2>${transportId}</h2><canvas id="q"></canvas>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>
  <script>QRCode.toCanvas(document.getElementById('q'), "${transportId}");<\/script>`);
}

// Druk palet
function printPalets(){
  let w=window.open("");
  lista.forEach(k=>{
    w.document.write(`<div style="page-break-after:always;text-align:center">
      <h2>${k}</h2>
      <svg id="b${k}"></svg>
    </div>`);
  });
  w.document.write(`<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"><\/script>
    <script>${lista.map(k=>`JsBarcode("#b${k}","${k}")`).join(";")}<\/script>`);
}

// --- Odbiór ---
function scanQR(){
  const qrScanner=new Html5Qrcode("reader");
  qrScanner.start({facingMode:"environment"},{fps:10,qrbox:250}, msg=>{
    qrScanner.stop();
    qr.value=msg;
    showOdbior();
  });
}

async function showOdbior(){
  let id=qr.value.trim();
  if(!id) return alert("Podaj ID transportu!");
  const docSnap=await db.collection("transports").doc(id).get();
  if(!docSnap.exists) return alert("Transport nie znaleziony");
  const data=docSnap.data();
  transportId=data.id;
  odebraneSet.clear();

  let palety = data.palety.sort();
  let html="";
  palety.forEach(p=>{
    html+=`<div class="item">
      <input type="checkbox" onchange="check('${p}',this)">
      ${p} <svg id="bc${p}"></svg>
    </div>`;
  });
  odbiorLista.innerHTML=html;
  palety.forEach(p=>setTimeout(()=>JsBarcode(`#bc${p}`,p,{format:"CODE128"}),10));
  podsum();
}

function check(k,el){
  if(el.checked) odebraneSet.add(k);
  else odebraneSet.delete(k);
  podsum();
}

function podsum(){
  let total=document.querySelectorAll("#odbiorLista .item").length;
  let ok=odebraneSet.size;
  podsumowanie.innerHTML=`OK: ${ok} / ${total} | BRAK: ${total-ok}`;
}

function resetOdbior(){
  qr.value=""; odbiorLista.innerHTML=""; podsumowanie.innerHTML="";
  odebraneSet.clear();
}

function exportExcel(){
  if(!transportId) return alert("Brak transportu");
  let csv="Transport;Paleta;Status\n";
  document.querySelectorAll("#odbiorLista .item").forEach(el=>{
    let kod=el.querySelector("input").nextSibling.textContent.trim();
    let status=el.querySelector("input").checked?"OK":"BRAK";
    csv+=`${transportId};${kod};${status}\n`;
  });
  let data=new Date().toISOString().slice(0,10);
  let blob=new Blob([csv],{type:"text/csv"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`${data}_${transportId}.csv`;
  a.click();
}
</script>
</body>
</html>
