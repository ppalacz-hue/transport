<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Transport Multi-Magazyn</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Biblioteki -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{margin:0;font-family:Arial;background:white;color:black;text-align:center;}
.header{display:flex;background:#ff5a00;padding:15px;font-size:20px;font-weight:bold;justify-content:center;}
.button-select,.button-round{padding:15px 25px;margin:15px;cursor:pointer;background:#1c2b33;color:white;border:none;border-radius:15px;font-size:18px;transition:.3s;}
.button-select:hover,.button-round:hover{background:#ff5a00;}
.section{display:none;padding:20px;}
.section.active{display:block;}
input,textarea{padding:10px;margin:5px;width:250px;}
.list{margin-top:20px;}
.item{display:flex;justify-content:space-between;border-bottom:1px solid #ccc;padding:5px;align-items:center;}
.item svg{margin-left:10px;}
.center-btn{display:flex;justify-content:center;}
</style>
</head>
<body>
<div class="header">🚚 SYSTEM TRANSPORTOWY</div>

<!-- Panel startowy -->
<div id="selectProcess" class="section active">
<h2>Wybierz proces:</h2>
<div class="center-btn">
<button class="button-select" onclick="showProcess('prep')">📦 Przygotowanie transportu</button>
<button class="button-select" onclick="showProcess('odbior')">📥 Odbiór transportu</button>
</div>
</div>

<!-- Przygotowanie -->
<div id="prep" class="section">
<h3>Przygotowanie transportu</h3>
<input id="magZ" placeholder="Magazyn Z">
<input id="magDo" placeholder="Magazyn DO">
<input id="auto" placeholder="Nr auta"><br>
<input id="scan" placeholder="Skanuj kod palety..." autofocus>
<button class="button-round" onclick="resetPrep()">Reset</button>
<button class="button-round" onclick="closeTruck()">Zamknij Truck / Generuj QR</button>
<button class="button-round" onclick="printTransport()">🧾 Wydruk</button>
<button class="button-round" onclick="printLabels()">🏷️ Druk opisówek palet</button>
<div class="center-btn"><button class="button-round" onclick="backToMenu()">⬅️ Panel główny</button></div>
<div id="lista" class="list"></div>
</div>

<!-- Odbiór -->
<div id="odbior" class="section">
<h3>Odbiór transportu</h3>
<button class="button-round" onclick="scanQR()">📱 Skanuj QR</button>
<button class="button-round" onclick="resetOdbior()">Reset</button>
<button class="button-round" onclick="exportExcel()">📊 Excel</button><br>
<textarea id="qrInput" placeholder="Wklej lub zeskanuj QR"></textarea>
<button class="button-round" onclick="showOdbior()">Pokaż</button>
<div class="center-btn"><button class="button-round" onclick="backToMenu()">⬅️ Panel główny</button></div>
<div id="odbiorLista"></div>
<div id="podsumowanie"></div>
<div id="reader"></div>
</div>

<script>
// Firebase
const firebaseConfig={
apiKey:"API_KEY_HERE",
authDomain:"PROJECT.firebaseapp.com",
projectId:"PROJECT",
storageBucket:"PROJECT.appspot.com",
messagingSenderId:"SENDER_ID",
appId:"APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

// Zmienne
let palety=[], transportId="", odebraneSet=new Set();

// Panel startowy
function backToMenu(){document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));document.getElementById("selectProcess").classList.add("active");resetPrep();resetOdbior();}
function showProcess(id){document.getElementById('selectProcess').classList.remove('active');document.getElementById(id).classList.add('active');}

// Przygotowanie
document.getElementById("scan").addEventListener("keypress", e=>{
  if(e.key==="Enter"){
    const k=document.getElementById("scan").value.trim();
    if(k!="" && !palety.includes(k)) palety.push(k);
    document.getElementById("scan").value="";
    renderPrep();
  }
});
function renderPrep(){let html="";palety.forEach((p,i)=>{html+=`<div class="item">${p} <button onclick="removePaleta(${i})">X</button></div>`});document.getElementById("lista").innerHTML="<b>Palet: "+palety.length+"</b>"+html;}
function removePaleta(i){palety.splice(i,1);renderPrep();}
function resetPrep(){palety=[];renderPrep();document.getElementById("magZ").value="";document.getElementById("magDo").value="";document.getElementById("auto").value="";document.getElementById("scan").value="";}

// Zamknięcie trucka i generacja QR + reset panelu
function closeTruck(){
    const auto = document.getElementById("auto").value.trim();
    const magZ = document.getElementById("magZ").value.trim();
    const magDo = document.getElementById("magDo").value.trim();
    if(auto==""||magZ==""||magDo==""||palety.length===0){alert("Wpisz auto, magazyny i zeskanuj palety!"); return;}

    // Otwieramy okno natychmiast
    const noweOkno = window.open("", "_blank");
    if(!noweOkno){alert("Popup zablokowany! Zezwól na otwieranie nowych okien."); return;}

    // zapis do Firebase
    transportId = "T-"+Date.now();
    db.collection("transports").doc(transportId).set({auto,magazynZ:magZ,magazynDo:magDo,palety});

    // generacja QR – tylko lista palet + info do wydruku
    const dane = palety.join("\n");
    noweOkno.document.write(`
        <html>
        <head><title>QR Transport</title></head>
        <body style="text-align:center;font-family:Arial;">
        <h2>Auto: ${auto}</h2>
        <p>Magazyn: ${magZ} → ${magDo}</p>
        <p>Ilość palet: ${palety.length}</p>
        <div id="qrcode"></div>
        <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"><\/script>
        <script>
            QRCode.toCanvas("${dane.replace(/\n/g,"\\n")}", {width:300}, function(err,canvas){
                document.getElementById("qrcode").appendChild(canvas);
            });
        <\/script>
        </body>
        </html>
    `);
    noweOkno.document.close();

    // Wyzerowanie panelu przygotowania
    resetPrep();
}

// Wydruk transportu
function printTransport(){const printContents=document.getElementById("prep").innerHTML;const original=document.body.innerHTML;document.body.innerHTML=printContents;window.print();document.body.innerHTML=original;location.reload();}

// Druk osobnych etykiet dla palet
function printLabels(){
    if(palety.length===0){alert("Brak palet do drukowania"); return;}
    const auto = document.getElementById("auto").value.trim();
    const noweOkno = window.open("", "_blank");
    if(!noweOkno){alert("Popup zablokowany!"); return;}
    let html = `<html><head><title>Etykiety palet</title></head><body style="font-family:Arial;text-align:center;">`;
    palety.forEach((p,i)=>{
        html+=`<div style="margin:20px; border:1px solid #000; padding:10px; display:inline-block;">
        <h3>Paleta: ${p}</h3>
        <p>Auto: ${auto}</p>
        <svg id="bc${i}"></svg>
        </div>`;
    });
    html+=`<script src="https://cdn.jsdelivr.net/npm/jsbarcode/dist/JsBarcode.all.min.js"><\/script>`;
    html+=`<script>palety = ${JSON.stringify(palety)}; palety.forEach((p,i)=>{JsBarcode('#bc'+i,p,{format:'CODE128'});}); window.print();<\/script>`;
    html+=`</body></html>`;
    noweOkno.document.write(html);
    noweOkno.document.close();
}

// Odbiór
function scanQR(){const qrScanner=new Html5Qrcode("reader");qrScanner.start({facingMode:"environment"},{fps:10,qrbox:250},msg=>{qrScanner.stop();document.getElementById("qrInput").value=msg;showOdbior();});}
function showOdbior(){const val=document.getElementById("qrInput").value.trim();if(val==""){alert("Wklej lub zeskanuj QR");return;}try{let palText=val.split("\n");palety=palText.map(p=>p.trim()).filter(p=>p);let html="";palety.forEach(p=>{html+=`<div class="item"><input type="checkbox" onchange="check('${p}',this)">${p} <svg id="bc${p}"></svg></div>`});document.getElementById("odbiorLista").innerHTML=html;palety.forEach(p=>setTimeout(()=>JsBarcode(`#bc${p}`,p,{format:"CODE128"}),10));odebraneSet.clear();podsum();}catch(e){alert("Niepoprawny QR");}}
function check(k,el){if(el.checked)odebraneSet.add(k);else odebraneSet.delete(k);podsum();}
function podsum(){const total=document.querySelectorAll("#odbiorLista .item").length;const ok=odebraneSet.size;document.getElementById("podsumowanie").innerHTML=`OK: ${ok} / ${total} | BRAK: ${total-ok}`;}
function resetOdbior(){document.getElementById("qrInput").value="";document.getElementById("odbiorLista").innerHTML="";document.getElementById("podsumowanie").innerHTML="";odebraneSet.clear();}
function exportExcel(){if(!palety||palety.length===0){alert("Brak transportu");return;}let csv="Auto;Paleta;Status\n";document.querySelectorAll("#odbiorLista .item").forEach(el=>{let kod=el.querySelector("input").nextSibling.textContent.trim();let status=el.querySelector("input").checked?"OK":"BRAK";csv+=`${document.getElementById("auto").value};${kod};${status}\n`;});const blob=new Blob([csv],{type:"text/csv"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`Transport_${Date.now()}.csv`;a.click();}
</script>
</body>
</html>
